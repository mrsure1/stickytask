<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fdf3b4; /* 포스트잇 노란색 */
            font-family: 'Malgun Gothic', 'Segoe UI', sans-serif;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            -webkit-app-region: drag; /* 이동 가능 */
        }
        .icon {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
            animation: pulse 2s infinite ease-in-out;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
            color: #5d4037;
            margin-bottom: 15px;
        }
        .loader {
            width: 150px;
            height: 4px;
            background-color: #e0d592;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .loader::after {
            content: '';
            position: absolute;
            width: 40%;
            height: 100%;
            background-color: #5d4037;
            animation: loading 1.5s infinite ease-in-out;
        }
        @keyframes loading {
            0% { left: -40%; }
            100% { left: 100%; }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <img src="icon.png" class="icon" alt="StickyTask Icon">
    <div class="title">StickyTask</div>
    <div class="loader"></div>
    <p style="font-size: 11px; color: #8d6e63; margin-top: 10px;">Google Tasks 불러오는 중...</p>
</body>
</html>
