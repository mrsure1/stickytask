<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>StickyTask Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sticky-note">
        <header class="drag-handle">
            <div class="header-content">
                <span class="title">StickyTask</span>
                <div class="window-controls">
                    <button id="settings-btn" title="설정">⚙️</button>
                </div>
            </div>
        </header>

        <!-- 설정 오버레이 -->
        <div id="settings-overlay" class="settings-overlay hidden">
            <div class="settings-content">
                <h3>설정</h3>
                <div class="setting-item">
                    <label>배경 색상</label>
                    <div class="color-presets">
                        <div class="color-dot yellow" data-color="#fff176" data-header="#fdd835"></div>
                        <div class="color-dot blue" data-color="#b3e5fc" data-header="#81d4fa"></div>
                        <div class="color-dot green" data-color="#c8e6c9" data-header="#a5d6a7"></div>
                        <div class="color-dot pink" data-color="#f8bbd0" data-header="#f48fb1"></div>
                        <div class="color-dot purple" data-color="#e1bee7" data-header="#ce93d8"></div>
                        <div class="color-dot white" data-color="#f5f5f5" data-header="#e0e0e0"></div>
                    </div>
                </div>
                <div class="setting-item">
                    <label>투명도</label>
                    <input type="range" id="opacity-slider" min="0.5" max="1.0" step="0.05" value="1.0">
                </div>
                <button id="save-settings-btn">닫기</button>
            </div>
        </div>
        
        <main class="content">
            <div class="input-group">
                <input type="text" id="task-input" placeholder="새 할 일 추가..." autocomplete="off" enterkeyhint="done">
                <button id="add-btn">+</button>
            </div>
            
            <ul id="task-list">
                <li class="task-item empty">할 일이 없습니다.</li>
            </ul>
        </main>
        
        <footer>
            <div class="status-bar">
                <span id="sync-status">로그인 필요</span>
                <button id="login-btn">Google 로그인</button>
            </div>
        </footer>
    </div>

    <!-- Capacitor Plugins -->
    <script src="renderer.js" type="module"></script>
</body>
</html>
